<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>招聘信息聚合</title>
  <link rel="stylesheet" href="css/style.css">
</head>
<body>

  <!-- Header -->
  <header class="header">
    <div class="container">
      <div class="header-inner">
        <h1 class="site-title">招聘信息聚合</h1>
        <p class="site-subtitle">会计专硕2401专用</p>
      </div>
    </div>
  </header>

  <!-- Toolbar -->
  <section class="toolbar">
    <div class="container">
      <div class="toolbar-inner">
        <div class="search-box">
          <input type="text" id="searchInput" placeholder="搜索公司、职位、关键词…" class="search-input">
        </div>
        <div class="filter-group">
          <select id="locationFilter" class="filter-select">
            <option value="">全部地点</option>
          </select>
          <select id="typeFilter" class="filter-select">
            <option value="">全部类型</option>
          </select>
          <select id="hcFilter" class="filter-select">
            <option value="">全部HC状态</option>
            <option value="有HC">有HC</option>
            <option value="未知">未知/暂无</option>
          </select>
        </div>
        <div class="stats">
          共 <span id="jobCount">0</span> 条招聘信息
        </div>
      </div>
    </div>
  </section>

  <!-- Job List -->
  <main class="main">
    <div class="container">
      <div id="jobList" class="job-grid"></div>
      <div id="emptyState" class="empty-state" style="display:none;">
        <div class="empty-icon">—</div>
        <p>没有匹配的招聘信息</p>
        <p class="empty-hint">试试其他关键词或筛选条件</p>
      </div>
    </div>
  </main>

  <!-- Detail Modal -->
  <div id="detailModal" class="modal" style="display:none;">
    <div class="modal-backdrop"></div>
    <div class="modal-content">
      <button class="modal-close" id="modalClose">&times;</button>
      <div id="modalBody"></div>
    </div>
  </div>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <p>招聘信息由人工整理，仅供参考。如有疑问请通过内推链接联系对应公司。</p>
    </div>
  </footer>

  <script src="js/app.js"></script>
</body>
</html>
